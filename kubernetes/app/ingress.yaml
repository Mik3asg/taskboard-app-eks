apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskboard-ingress
  namespace: taskboard
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "eks.labs.virtualscale.dev"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - eks.labs.virtualscale.dev
      secretName: taskboard-tls
  rules:
    - host: eks.labs.virtualscale.dev
      http:
        paths:
          # API calls from the React frontend — routed to the Express backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # All other traffic — served by the nginx-fronted React app
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
