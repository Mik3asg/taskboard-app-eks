# ClusterIssuer using DNS-01 challenge via Route53.
# DNS-01 is required for wildcard certs and works even when the cluster
# is not publicly reachable on port 80 (unlike HTTP-01).
#
# Apply this AFTER cert-manager is running and its CRDs are installed.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mickael.devops@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: eu-west-2
            # cert-manager uses IRSA — no explicit credentials needed here.
            # The service account annotation (eks.amazonaws.com/role-arn) in
            # the Helm values handles auth via the OIDC token.
