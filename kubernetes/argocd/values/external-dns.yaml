provider:
  name: aws
env:
  - name: AWS_DEFAULT_REGION
    value: eu-west-2
sources:
  - ingress
  - service
policy: sync
txtOwnerId: "taskboard-app-eks"
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::207137402976:role/taskboard-app-eks-prod-external-dns"
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
