name: App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "kubernetes/**"
      - ".github/workflows/app.yml"
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Build & push images to ECR ─────────────────────────────────────────────
  build-push:
    name: Build, scan, and push images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Multi-stage build — context is repo root so Dockerfile can reach app/
      - name: Build frontend image
        run: docker build -f "${{ github.workspace }}/app/frontend/Dockerfile" -t "${{ env.ECR_REGISTRY }}/taskboard-app-eks/frontend:${{ env.IMAGE_TAG }}" -t "${{ env.ECR_REGISTRY }}/taskboard-app-eks/frontend:latest" "${{ github.workspace }}"

      - name: Build backend image
        run: docker build -f "${{ github.workspace }}/app/backend/Dockerfile" -t "${{ env.ECR_REGISTRY }}/taskboard-app-eks/backend:${{ env.IMAGE_TAG }}" -t "${{ env.ECR_REGISTRY }}/taskboard-app-eks/backend:latest" "${{ github.workspace }}"

      # Trivy scans images for CVEs before they reach ECR
      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/taskboard-app-eks/frontend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/taskboard-app-eks/backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

      - name: Push images to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/taskboard-app-eks/frontend:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/taskboard-app-eks/frontend:latest
          docker push ${{ env.ECR_REGISTRY }}/taskboard-app-eks/backend:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/taskboard-app-eks/backend:latest

  # ── Deploy: update manifests + trigger ArgoCD sync ─────────────────────────
  deploy:
    name: Deploy to EKS via ArgoCD
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Stamp the new ECR image tag into the Helm values so ArgoCD sees a diff
      - name: Update image tags in Helm values
        run: |
          sed -i "s|frontendTag:.*|frontendTag: \"$IMAGE_TAG\"|" \
            kubernetes/taskboard/values.yaml
          sed -i "s|backendTag:.*|backendTag: \"$IMAGE_TAG\"|" \
            kubernetes/taskboard/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/taskboard/values.yaml
          git commit -m "ci: update image tags to $IMAGE_TAG [skip ci]"
          git pull --rebase origin main
          git push

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          argocd app sync taskboard \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_TOKEN \
            --insecure
          argocd app wait taskboard \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_TOKEN \
            --insecure \
            --timeout 120
