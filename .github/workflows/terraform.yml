name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

permissions:
  # Required for GitHub OIDC → AWS role assumption (no long-lived keys needed)
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.10.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Bootstrap ──────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap (S3 state bucket)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/bootstrap

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/bootstrap
          framework: terraform
          soft_fail: false
          # Checks skipped for self-training project — all documented with reason:
          # CKV_AWS_144: cross-region replication (overkill for state bucket)
          # CKV2_AWS_62: S3 event notifications (not needed)
          # CKV_AWS_18:  S3 access logging (unnecessary cost)
          # CKV_AWS_145: KMS encryption (AES256 sufficient)
          # CKV2_AWS_61: S3 lifecycle policy (state files have no expiry requirement)
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145,CKV2_AWS_61

  # ── Infrastructure ─────────────────────────────────────────────────────────
  infrastructure:
    name: Infrastructure (VPC / EKS / DNS / IRSA)
    runs-on: ubuntu-latest
    needs: bootstrap
    defaults:
      run:
        working-directory: terraform/infrastructure

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format check
        run: terraform fmt -check -recursive

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/infrastructure
          framework: terraform
          soft_fail: false
          # Checks skipped for self-training project — all documented with reason:
          # CKV_AWS_274:  GitHub Terraform role uses AdministratorAccess (acceptable for self-training)
          # CKV_AWS_51:   ECR MUTABLE tags required — CI pipeline pushes :latest
          # CKV_AWS_136:  ECR KMS encryption (AES256 sufficient for self-training)
          # CKV_AWS_382:  SG egress 0.0.0.0/0 required for EKS nodes to reach AWS APIs
          # CKV_AWS_39:   EKS public endpoint needed for kubectl access from laptop/CI
          # CKV_AWS_38:   EKS public endpoint IP restriction (open access needed for self-training)
          # CKV_AWS_37:   EKS logs api/audit/authenticator — scheduler/controllerManager omitted (cost)
          # CKV_AWS_58:   EKS secrets encryption with KMS (adds cost, overkill here)
          # CKV_AWS_130:  Public subnets auto-assign IP required for NLB
          # CKV2_AWS_5:   False positive — nodes SG attached via node group, not direct reference
          # CKV2_AWS_12:  Default VPC SG restriction (not needed for self-training)
          # CKV2_AWS_11:  VPC flow logging (adds cost)
          # CKV2_AWS_38:  Route53 DNSSEC (unnecessary for self-training)
          # CKV2_AWS_39:  Route53 DNS query logging (adds cost)
          skip_check: CKV_AWS_274,CKV_AWS_51,CKV_AWS_136,CKV_AWS_382,CKV_AWS_39,CKV_AWS_38,CKV_AWS_37,CKV_AWS_58,CKV_AWS_130,CKV2_AWS_5,CKV2_AWS_12,CKV2_AWS_11,CKV2_AWS_38,CKV2_AWS_39

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true

      # Post the plan as a PR comment so reviewers can see the diff
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        # Only apply on push to main, not on PRs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
