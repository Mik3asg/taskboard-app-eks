server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for any path not found on disk
    # This lets the client-side router handle /tasks, /projects, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # In production on K8s, /api is routed to the backend by NGINX Ingress.
    # This block handles /api in local docker-compose (nginx acts as proxy).
    location /api {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Lightweight health check endpoint for K8s probes
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
